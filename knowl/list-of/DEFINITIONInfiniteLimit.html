</h2>
<div class="para logical">
<div class="para">Suppose <span class="process-math">\(f(x)\)</span> is defined near <span class="process-math">\(x=a\text{.}\)</span> Then we say</div>
<div class="displaymath process-math">
\begin{equation*}
\limit{x}{a}{f(x)=\infty }
\end{equation*}
</div>
<div class="para">if and only if</div>
<div class="displaymath process-math">
\begin{equation*}
\rlimit{x}{a}{f(x)=\infty
}=\llimit{x}{a}{ f(x) }\text{.}
\end{equation*}
</div>
