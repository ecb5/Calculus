<span class="type">Lemma</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">25.6.0.7</span><span class="period heading-divison-mark heading-divison-mark__period">.</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="title">Triangle Inequality for Integrals.</span>
</h2>
<div class="para logical">
<div class="para">Suppose <span class="process-math">\(f(x)\)</span> is continuous on <span class="process-math">\([a,b]\text{.}\)</span>  Then</div>
<div class="displaymath process-math">
\begin{equation*}
\abs{\int^b_{x=a}{f\left(x\right)dx}}\le \int^b_{x=a}{\left|f\left(x\right)\right|}dx
\end{equation*}
</div>
