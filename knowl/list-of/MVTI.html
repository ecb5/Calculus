<article class="theorem theorem-like"><h2 class="heading">
<span class="type">Theorem</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">24.2.0.1</span><span class="period heading-divison-mark heading-divison-mark__period">.</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="title">The Mean Value Theorem for Integrals.</span>
</h2>
<div class="para logical">
<div class="para">Suppose <span class="process-math">\(f(x)\)</span> is continuous on <span class="process-math">\([a,b]\text{.}\)</span>  Then there is a value <span class="process-math">\(c\)</span> between <span class="process-math">\(a\)</span> and <span class="process-math">\(b\)</span> with</div>
<div class="displaymath process-math">
\begin{equation*}
\int^b_{x=a}{f\left(x\right)\dx{x}}=f(c)(b-a)
\end{equation*}
</div>
